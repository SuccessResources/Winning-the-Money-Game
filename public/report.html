<style>
:root {
  --green:      #259c5b;
  --green-deep: #0f3d24;
  --green-soft: #e6f5ef;
  --ink:        #0a0a0a;
  --ink-soft:   #4a4a4a;
  --ink-lite:   #7a7a7a;
  --line:       #e4e2dd;
  --paper:      #ffffff;
  --cream:      #f7f5f0;
  --gold:       #c19a5b;
  --gold-soft:  #f5edd8;
  --accent:     #259c5b; /* overridden per pattern by JS */
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  color: var(--ink);
  background: var(--cream);
  -webkit-font-smoothing: antialiased;
}
@media print {
  .no-print { display: none !important; }
  body { background: #fff; }
}

/* ── PRINT BAR ── */
.print-bar {
  background: var(--ink); padding: 14px 48px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px;
}
.print-bar p { font-size: 13px; color: rgba(255,255,255,0.55); }
.print-bar p strong { color: #fff; }
.btn-print {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 18px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 999px; color: #fff; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: background 200ms; white-space: nowrap;
}
.btn-print:hover { background: rgba(255,255,255,0.18); }

/* ── PAGE ── */
.page { max-width: 860px; margin: 32px auto; background: var(--paper); box-shadow: 0 4px 60px rgba(0,0,0,0.08); border-radius: 4px; overflow: hidden; }

/* ── COVER ── */
.cover { background: var(--ink); padding: 56px 64px 64px; position: relative; overflow: hidden; }
.cover::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 55% 60% at 80% 0%, rgba(37,156,91,0.2), transparent 60%),

  pointer-events: none;
}
.cover-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 60px; position: relative; z-index: 1; }
.cover-logo-mark { width: 30px; height: 30px; color: var(--green); }
.cover-logo-mark svg { width: 100%; height: 100%; }
.cover-logo-text { font-weight: 800; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.85); }

.cover-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--green); display: flex; align-items: center; gap: 12px; margin-bottom: 24px; position: relative; z-index: 1; }
.cover-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--green); }

.cover-name-greeting { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 8px; position: relative; z-index: 1; letter-spacing: 0.04em; }
.cover-pattern-name { font-family: 'Fraunces', serif; font-weight: 300; font-style: italic; font-size: clamp(52px, 7vw, 80px); line-height: 0.95; letter-spacing: -0.03em; color: #fff; margin-bottom: 6px; position: relative; z-index: 1; }
.cover-pattern-name .accent-word { color: var(--accent); font-style: italic; }
.cover-pattern-sub { font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 0.04em; margin-bottom: 40px; position: relative; z-index: 1; }

/* Phase progress bar */
.phase-bar { display: flex; align-items: center; gap: 0; max-width: 400px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 5px; margin-bottom: 40px; position: relative; z-index: 1; }
.phase-node { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 7px 12px; border-radius: 999px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.35); white-space: nowrap; }
.phase-node.active { background: var(--accent); color: #fff; }

.cover-desc { font-size: 16px; line-height: 1.65; color: rgba(255,255,255,0.7); font-weight: 300; max-width: 580px; margin-bottom: 36px; position: relative; z-index: 1; }
.cover-desc strong { color: #fff; font-weight: 600; }
.cover-meta { display: flex; gap: 28px; padding-top: 28px; border-top: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 1; flex-wrap: wrap; }
.cover-meta-item { display: flex; flex-direction: column; gap: 3px; }
.cover-meta-label { font-size: 9px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
.cover-meta-value { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); }
.cover-meta-tag { display: inline-flex; background: var(--green-soft); color: var(--green-deep); padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; }

/* ── SECTIONS ── */
.section { padding: 52px 64px; border-bottom: 1px solid var(--line); }
.section:last-child { border-bottom: none; }
.section-alt { background: var(--cream); }
.section-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.section-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--accent); }
.section-title { font-family: 'Fraunces', serif; font-weight: 400; font-size: clamp(26px, 3.2vw, 38px); line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 14px; color: var(--ink); }
.section-title em { font-style: italic; color: var(--accent); }
.section-intro { font-size: 15px; line-height: 1.7; color: var(--ink-soft); font-weight: 300; max-width: 580px; margin-bottom: 32px; }

/* Belief box */
.belief-box { background: var(--ink); border-radius: 6px; padding: 36px 44px; position: relative; overflow: hidden; }
.belief-box::before { content: '"'; font-family: 'Fraunces', serif; font-size: 180px; line-height: 0.7; position: absolute; top: -5px; left: 24px; color: var(--accent); opacity: 0.18; pointer-events: none; }
.belief-quote { font-family: 'Fraunces', serif; font-weight: 300; font-style: italic; font-size: clamp(20px, 2.6vw, 28px); line-height: 1.35; letter-spacing: -0.01em; color: #fff; position: relative; z-index: 1; margin-bottom: 16px; }
.belief-label { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.35); position: relative; z-index: 1; }
.belief-label span { color: var(--accent); }

/* Fingerprint */
.fp-wrap { display: grid; grid-template-columns: 260px 1fr; gap: 40px; align-items: center; }
.fp-labels { display: flex; flex-direction: column; gap: 14px; }
.fp-row { display: flex; align-items: center; gap: 12px; }
.fp-row-text { font-size: 12px; font-weight: 500; color: var(--ink-soft); width: 120px; flex-shrink: 0; }
.fp-track { flex: 1; height: 5px; background: var(--line); border-radius: 999px; overflow: hidden; }
.fp-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width 800ms cubic-bezier(0.2,0.8,0.2,1); }
.fp-fill.low { background: #e05555; }
.fp-fill.mid { background: var(--gold); }
.fp-fill.high { background: var(--accent); }
.fp-score { font-size: 11px; font-weight: 700; color: var(--ink-lite); width: 24px; text-align: right; flex-shrink: 0; }

/* Two col cards */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.insight-card { padding: 28px; border-radius: 4px; border: 1px solid var(--line); }
.insight-card.blind { border-left: 3px solid #e05555; }
.insight-card.strength { border-left: 3px solid var(--accent); }
.insight-label { font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 10px; }
.insight-card.blind .insight-label { color: #e05555; }
.insight-card.strength .insight-label { color: var(--accent); }
.insight-card h4 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 20px; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 8px; color: var(--ink); }
.insight-card p { font-size: 13.5px; line-height: 1.65; color: var(--ink-soft); font-weight: 300; }

/* Shifts */
.shifts { display: flex; flex-direction: column; }
.shift { display: grid; grid-template-columns: 44px 1fr; gap: 20px; padding: 28px 0; border-bottom: 1px solid var(--line); align-items: start; }
.shift:last-child { border-bottom: none; }
.shift-num { font-family: 'Fraunces', serif; font-size: 44px; line-height: 0.9; font-weight: 300; color: var(--accent); }
.shift h4 { font-weight: 700; font-size: 16px; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 6px; }
.shift p { font-size: 14px; line-height: 1.65; color: var(--ink-soft); font-weight: 300; margin-bottom: 10px; }
.shift-action { display: inline-flex; align-items: center; gap: 6px; background: var(--green-soft); color: var(--green-deep); padding: 5px 12px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
.shift-action::before { content: '→'; }

/* Blueprint */
.blueprint { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; border-radius: 6px; overflow: hidden; }
.bp-phase { padding: 24px 20px; background: var(--cream); }
.bp-phase.current { background: var(--ink); }
.bp-phase.locked { opacity: 0.5; filter: grayscale(0.4); position: relative; }
.bp-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-lite); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.bp-phase.current .bp-label { color: rgba(255,255,255,0.4); }
.bp-badge { padding: 2px 7px; border-radius: 999px; background: var(--green-soft); color: var(--green-deep); font-size: 9px; font-weight: 700; }
.bp-phase.current .bp-badge { background: var(--accent); color: #fff; }
.bp-phase h4 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 18px; line-height: 1.2; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 10px; }
.bp-phase.current h4 { color: #fff; }
.bp-phase ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.bp-phase ul li { font-size: 12px; line-height: 1.5; color: var(--ink-soft); display: flex; align-items: flex-start; gap: 6px; }
.bp-phase.current ul li { color: rgba(255,255,255,0.6); }
.bp-phase ul li::before { content: '·'; color: var(--accent); font-weight: 900; font-size: 16px; line-height: 1.1; flex-shrink: 0; }

/* CTA section */
.cta-section { text-align: center; padding: 64px 64px; background: var(--ink); position: relative; overflow: hidden; }
.cta-section::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 55% 60% at 50% 100%, rgba(37,156,91,0.2), transparent 70%); pointer-events: none; }
.cta-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); display: inline-flex; align-items: center; gap: 10px; margin-bottom: 18px; position: relative; z-index: 1; }
.cta-eyebrow::before, .cta-eyebrow::after { content: ''; width: 22px; height: 1px; background: var(--accent); }
.cta-section h2 { font-family: 'Fraunces', serif; font-weight: 300; font-style: italic; font-size: clamp(26px, 3.5vw, 40px); line-height: 1.1; letter-spacing: -0.02em; color: #fff; margin-bottom: 14px; position: relative; z-index: 1; }
.cta-section h2 em { font-style: normal; color: var(--accent); }
.cta-section p { font-size: 15px; line-height: 1.65; color: rgba(255,255,255,0.6); font-weight: 300; max-width: 460px; margin: 0 auto 28px; position: relative; z-index: 1; }
.btn-cta { display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; background: var(--accent); color: #fff; border: none; border-radius: 999px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; box-shadow: 0 6px 24px rgba(37,156,91,0.4); position: relative; z-index: 1; transition: transform 250ms, box-shadow 250ms; }
.btn-cta:hover { transform: translateY(-2px); }
.cta-meta { margin-top: 12px; font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.04em; position: relative; z-index: 1; }

.report-footer { padding: 24px 64px; background: var(--cream); border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--ink-lite); letter-spacing: 0.06em; }
.report-footer strong { color: var(--ink); }
</style>
</head>
